<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月のしるし — 家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f5f0e8;--bg2:#ede6d6;--paper:#faf7f2;--ink:#2a2118;--ink2:#5c4f3d;
  --ink3:#9c8e7a;--accent:#8b4513;--accent2:#c17f3e;--green:#4a7c59;
  --red:#a83232;--blue:#2e5f8a;--border:#d4c9b5;--shadow:rgba(42,33,24,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Noto Serif JP',serif;min-height:100vh;}
header{background:var(--paper);border-bottom:2px solid var(--border);padding:16px 32px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 12px var(--shadow);position:sticky;top:0;z-index:100;}
.logo{font-family:'Shippori Mincho',serif;font-size:1.5rem;color:var(--accent);letter-spacing:0.15em;}
.logo-sub{font-size:0.7rem;color:var(--ink3);letter-spacing:0.2em;}
#syncStatus{font-size:0.7rem;letter-spacing:0.1em;margin-left:8px;padding:3px 10px;border-radius:20px;border:1px solid transparent;transition:all 0.3s;}
.header-nav{margin-left:auto;display:flex;gap:6px;}
.nav-btn{background:none;border:1px solid var(--border);color:var(--ink2);padding:5px 14px;font-family:'Noto Serif JP',serif;font-size:0.78rem;border-radius:2px;cursor:pointer;transition:all 0.2s;letter-spacing:0.1em;}
.nav-btn:hover,.nav-btn.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.month-bar{background:var(--paper);border-bottom:1px solid var(--border);padding:8px 32px;display:flex;align-items:center;gap:10px;}
.month-nav{background:none;border:none;color:var(--ink3);font-size:1rem;cursor:pointer;padding:2px 8px;transition:color 0.2s;}
.month-nav:hover{color:var(--accent);}
.month-label{font-family:'Shippori Mincho',serif;font-size:1rem;color:var(--ink);letter-spacing:0.15em;min-width:96px;text-align:center;}
main{max-width:1100px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;}
@media(max-width:700px){main{grid-template-columns:1fr;}header{padding:12px 16px;}.month-bar{padding:8px 16px;}}
.card{background:var(--paper);border:1px solid var(--border);border-radius:4px;box-shadow:0 2px 8px var(--shadow);overflow:hidden;margin-bottom:16px;}
.card:last-child{margin-bottom:0;}
.card-header{background:var(--bg2);padding:10px 16px;border-bottom:1px solid var(--border);font-size:0.75rem;letter-spacing:0.2em;color:var(--ink2);font-weight:600;display:flex;align-items:center;gap:8px;}
.card-body{padding:16px;}
.budget-center{text-align:center;padding:8px 0 12px;}
.budget-remaining{font-family:'DM Mono',monospace;font-size:1.9rem;color:var(--accent);display:block;}
.budget-sublabel{font-size:0.68rem;color:var(--ink3);letter-spacing:0.15em;display:block;margin-top:2px;}
.bar-wrap{background:var(--bg2);border-radius:2px;height:7px;overflow:hidden;margin:8px 0 4px;}
.bar-fill{height:100%;border-radius:2px;transition:width 0.6s cubic-bezier(.4,0,.2,1),background 0.4s;}
.bar-meta{display:flex;justify-content:space-between;font-size:0.65rem;color:var(--ink3);margin-bottom:10px;}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.stat-box{background:var(--bg);border:1px solid var(--border);border-radius:3px;padding:8px;text-align:center;}
.stat-val{font-family:'DM Mono',monospace;font-size:0.95rem;display:block;}
.stat-lbl{font-size:0.63rem;color:var(--ink3);letter-spacing:0.1em;display:block;margin-top:2px;}
.budget-edit-btn{width:100%;background:none;border:1px dashed var(--border);color:var(--ink3);padding:7px;font-family:'Noto Serif JP',serif;font-size:0.73rem;cursor:pointer;border-radius:2px;letter-spacing:0.1em;transition:all 0.2s;}
.budget-edit-btn:hover{border-color:var(--accent);color:var(--accent);}
.cat-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--bg2);}
.cat-row:last-child{border-bottom:none;}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:0.76rem;flex:1;color:var(--ink2);}
.cat-nums{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink3);text-align:right;white-space:nowrap;}
.mini-bar{width:48px;height:4px;background:var(--bg2);border-radius:2px;overflow:hidden;flex-shrink:0;}
.mini-fill{height:100%;border-radius:2px;transition:width 0.5s;}
.form-group{margin-bottom:10px;}
.form-label{font-size:0.7rem;color:var(--ink2);letter-spacing:0.12em;display:block;margin-bottom:4px;}
.form-input,.form-select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:7px 9px;font-family:'Noto Serif JP',serif;font-size:0.83rem;color:var(--ink);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--accent);}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.type-label{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--ink2);cursor:pointer;}
.submit-btn{width:100%;background:var(--accent);color:#fff;border:none;padding:10px;font-family:'Shippori Mincho',serif;font-size:0.88rem;letter-spacing:0.15em;cursor:pointer;border-radius:2px;transition:background 0.2s;margin-top:2px;}
.submit-btn:hover{background:#6b3410;}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed;}
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px;}
@media(max-width:500px){.summary-row{grid-template-columns:repeat(2,1fr);}}
.sum-card{background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:12px 14px;box-shadow:0 1px 4px var(--shadow);}
.sum-label{font-size:0.65rem;color:var(--ink3);letter-spacing:0.18em;display:block;margin-bottom:5px;}
.sum-val{font-family:'DM Mono',monospace;font-size:1.1rem;display:block;}
.c-inc{color:var(--green);}.c-exp{color:var(--red);}.c-pos{color:var(--blue);}.c-neg{color:var(--red);}.c-bud{color:var(--accent2);}
.list-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.list-title{font-family:'Shippori Mincho',serif;font-size:0.88rem;letter-spacing:0.15em;color:var(--ink2);}
.filter-sel{font-size:0.7rem;background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:4px 8px;font-family:'Noto Serif JP',serif;color:var(--ink2);cursor:pointer;-webkit-appearance:none;}
.tx-item{background:var(--paper);border:1px solid var(--border);border-radius:3px;margin-bottom:6px;display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:12px;padding:10px 14px;box-shadow:0 1px 3px var(--shadow);transition:box-shadow 0.2s;animation:fadeIn 0.25s ease;}
.tx-item:hover{box-shadow:0 3px 10px var(--shadow);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.tx-date{font-family:'DM Mono',monospace;font-size:0.68rem;color:var(--ink3);white-space:nowrap;}
.tx-desc{font-size:0.82rem;color:var(--ink);}
.tx-memo{font-size:0.65rem;color:var(--ink3);margin-top:1px;}
.tx-badge{font-size:0.62rem;padding:2px 7px;border-radius:20px;white-space:nowrap;letter-spacing:0.06em;}
.tx-amount{font-family:'DM Mono',monospace;font-size:0.9rem;text-align:right;white-space:nowrap;}
.tx-del{background:none;border:none;color:var(--border);cursor:pointer;font-size:0.85rem;padding:2px 4px;border-radius:2px;transition:color 0.2s;}
.tx-del:hover{color:var(--red);}
.empty{text-align:center;padding:36px;color:var(--ink3);font-size:0.82rem;letter-spacing:0.1em;}
#chartCanvas{display:block;max-width:100%;}
.overlay{position:fixed;inset:0;background:rgba(42,33,24,0.5);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px;}
.overlay.open{display:flex;}
.modal{background:var(--paper);border:1px solid var(--border);border-radius:4px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(42,33,24,0.2);margin:auto;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1rem;letter-spacing:0.15em;color:var(--ink);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:1px solid var(--border);}
.modal-btn{padding:7px 18px;border-radius:2px;font-family:'Noto Serif JP',serif;font-size:0.78rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.modal-btn.cancel{background:none;border:1px solid var(--border);color:var(--ink2);}
.modal-btn.cancel:hover{border-color:var(--ink3);}
.modal-btn.save{background:var(--accent);border:1px solid var(--accent);color:#fff;}
.modal-btn.save:hover{background:#6b3410;}
.overall-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid var(--border);}
.overall-row label{flex:1;font-size:0.8rem;color:var(--ink);font-weight:600;}
.overall-row input{width:130px;background:var(--bg);border:1px solid var(--accent);border-radius:2px;padding:6px 9px;font-family:'DM Mono',monospace;font-size:0.95rem;color:var(--accent);text-align:right;outline:none;}
.cat-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-input-row label{flex:1;font-size:0.78rem;color:var(--ink2);display:flex;align-items:center;gap:6px;}
.cat-input-row input{width:110px;background:var(--bg);border:1px solid var(--border);border-radius:2px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--ink);text-align:right;outline:none;}
.cat-input-row input:focus{border-color:var(--accent);}
.modal-sec-label{font-size:0.68rem;color:var(--ink3);letter-spacing:0.12em;margin-bottom:8px;}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">月のしるし</div>
    <div class="logo-sub">家計簿</div>
  </div>
  <span id="syncStatus"></span>
  <nav class="header-nav">
    <button class="nav-btn active" id="btnList" onclick="switchView('list')">明細</button>
    <button class="nav-btn" id="btnChart" onclick="switchView('chart')">グラフ</button>
  </nav>
</header>

<div class="month-bar">
  <button class="month-nav" onclick="changeMonth(-1)">◀</button>
  <div class="month-label" id="monthLabel"></div>
  <button class="month-nav" onclick="changeMonth(1)">▶</button>
</div>

<main>
  <aside>
    <div class="card">
      <div class="card-header">◎ 今月の予算</div>
      <div class="card-body">
        <div class="budget-center">
          <span class="budget-remaining" id="budgetRemaining">¥0</span>
          <span class="budget-sublabel">残り予算</span>
        </div>
        <div class="bar-wrap"><div class="bar-fill" id="budgetBar" style="width:0%;background:var(--green)"></div></div>
        <div class="bar-meta"><span>使用済み</span><span id="budgetPct">0%</span></div>
        <div class="budget-grid">
          <div class="stat-box"><span class="stat-val" id="totalBudgetDisp">¥0</span><span class="stat-lbl">設定予算</span></div>
          <div class="stat-box"><span class="stat-val c-exp" id="totalExpDisp">¥0</span><span class="stat-lbl">支出合計</span></div>
        </div>
        <button class="budget-edit-btn" onclick="openBudgetModal()">予算を設定 / 編集</button>
      </div>
    </div>
    <div class="card">
      <div class="card-header">≡ カテゴリ別</div>
      <div class="card-body" style="padding:10px 16px;"><div id="catList"></div></div>
    </div>
    <div class="card">
      <div class="card-header">＋ 記録を追加</div>
      <div class="card-body">
        <div class="form-group">
          <label class="form-label">種別</label>
          <div class="type-row">
            <label class="type-label"><input type="radio" name="txType" value="expense" checked> 支出</label>
            <label class="type-label"><input type="radio" name="txType" value="income"> 収入</label>
          </div>
        </div>
        <div class="form-group"><label class="form-label">日付</label><input type="date" id="txDate" class="form-input"></div>
        <div class="form-group"><label class="form-label">金額（円）</label><input type="number" id="txAmount" class="form-input" placeholder="0" min="0"></div>
        <div class="form-group"><label class="form-label">内容</label><input type="text" id="txDesc" class="form-input" placeholder="例: スーパーで買い物"></div>
        <div class="form-group">
          <label class="form-label">カテゴリ</label>
          <select id="txCat" class="form-select">
            <option>食費</option><option>日用品</option><option>交通費</option><option>外食</option>
            <option>娯楽</option><option>医療</option><option>衣類</option><option>光熱費</option>
            <option>通信費</option><option>その他</option><option>給与</option><option>副収入</option>
          </select>
        </div>
        <div class="form-group"><label class="form-label">メモ（任意）</label><input type="text" id="txMemo" class="form-input"></div>
        <button class="submit-btn" id="submitBtn" onclick="addTransaction()">記録する</button>
      </div>
    </div>
  </aside>

  <div>
    <div class="summary-row">
      <div class="sum-card"><span class="sum-label">収入</span><span class="sum-val c-inc" id="sIncome">¥0</span></div>
      <div class="sum-card"><span class="sum-label">支出</span><span class="sum-val c-exp" id="sExpense">¥0</span></div>
      <div class="sum-card"><span class="sum-label">収支</span><span class="sum-val c-pos" id="sBalance">¥0</span></div>
      <div class="sum-card"><span class="sum-label">予算残</span><span class="sum-val c-bud" id="sBudRem">¥0</span></div>
    </div>
    <div id="listView">
      <div class="list-header">
        <span class="list-title">明細一覧</span>
        <select class="filter-sel" id="filterCat" onchange="renderTx()">
          <option value="">すべて</option>
          <option>食費</option><option>日用品</option><option>交通費</option><option>外食</option>
          <option>娯楽</option><option>医療</option><option>衣類</option><option>光熱費</option>
          <option>通信費</option><option>その他</option>
        </select>
        <select class="filter-sel" id="filterType" onchange="renderTx()">
          <option value="">すべて</option><option value="expense">支出</option><option value="income">収入</option>
        </select>
      </div>
      <div id="txList"></div>
    </div>
    <div id="chartView" style="display:none;">
      <div class="card">
        <div class="card-header">▣ カテゴリ別支出</div>
        <div class="card-body"><canvas id="chartCanvas"></canvas></div>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="budgetOverlay">
  <div class="modal">
    <div class="modal-title">予算の設定</div>
    <div class="overall-row">
      <label>月間合計予算</label>
      <input type="number" id="modalTotal" placeholder="0">
    </div>
    <div class="modal-sec-label">カテゴリ別予算（任意）</div>
    <div id="catInputs"></div>
    <div class="modal-footer">
      <button class="modal-btn cancel" onclick="closeBudgetModal()">キャンセル</button>
      <button class="modal-btn save" onclick="saveBudget()">保存</button>
    </div>
  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyMb6RtIm5aCk5fyZ-prP62-vHxircGCY0KTmZ2LHGtooFDtE23S3FHl96-QZmsGrvL/exec';
const CATS = ['食費','日用品','交通費','外食','娯楽','医療','衣類','光熱費','通信費','その他'];
const COLORS = {'食費':'#8b4513','日用品':'#c17f3e','交通費':'#2e5f8a','外食':'#a83232','娯楽':'#4a7c59','医療':'#6b5b95','衣類':'#d4845a','光熱費':'#5b8c5a','通信費':'#3a7ca5','その他':'#9c8e7a','給与':'#4a7c59','副収入':'#2e5f8a'};

let cy, cm;
let db = {};
let syncing = false;

function key(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function md(y,m){ const k=key(y,m); if(!db[k]) db[k]={transactions:[],budget:{total:0,cats:{}}}; return db[k]; }

function setSS(state){
  const el = document.getElementById('syncStatus');
  const MAP={idle:'',loading:'読み込み中…',saving:'保存中…',ok:'同期済み ✓',error:'同期失敗 ✕'};
  const COL={idle:'transparent',loading:'#fff8ee',saving:'#fff8ee',ok:'#eef6f0',error:'#fdf0f0'};
  const TC={idle:'var(--ink3)',loading:'var(--accent2)',saving:'var(--accent2)',ok:'var(--green)',error:'var(--red)'};
  const BC={idle:'transparent',loading:'var(--border)',saving:'var(--border)',ok:'#b5d8c1',error:'#e8b5b5'};
  el.textContent=MAP[state]||'';
  el.style.background=COL[state]||'transparent';
  el.style.color=TC[state]||'var(--ink3)';
  el.style.borderColor=BC[state]||'transparent';
}

async function loadCloud(){
  setSS('loading');
  try {
    const res = await fetch(GAS_URL + '?t=' + Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const json = JSON.parse(text);
    if(json && typeof json==='object' && !Array.isArray(json)){
      db = json;
      localStorage.setItem('kakeibo', JSON.stringify(db));
    }
    setSS('ok');
    return true;
  } catch(e){
    console.error('loadCloud error:', e);
    setSS('error');
    return false;
  }
}

async function saveCloud(){
  if(syncing) return;
  syncing = true;
  setSS('saving');
  localStorage.setItem('kakeibo', JSON.stringify(db));
  try {
    const payload = encodeURIComponent(JSON.stringify(db));
    const url = GAS_URL + '?action=save&data=' + payload;
    const res = await fetch(url);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const text = await res.text();
    const json = JSON.parse(text);
    if(json && json.status==='ok'){
      setSS('ok');
    } else {
      throw new Error('status not ok: '+text);
    }
  } catch(e){
    console.error('saveCloud error:', e);
    setSS('error');
  }
  syncing = false;
}

async function init(){
  const now = new Date();
  cy = now.getFullYear(); cm = now.getMonth()+1;
  document.getElementById('txDate').value = now.toISOString().split('T')[0];
  const local = localStorage.getItem('kakeibo');
  if(local) try { db=JSON.parse(local); } catch(e){}
  render();
  await loadCloud();
  render();
}

function changeMonth(d){
  cm+=d; if(cm>12){cm=1;cy++;} if(cm<1){cm=12;cy--;}
  render();
}

function render(){
  const m = md(cy,cm);
  document.getElementById('monthLabel').textContent = cy+'年 '+cm+'月';
  const income  = m.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = m.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income-expense;
  const total   = m.budget.total||0;
  const budRem  = total-expense;
  document.getElementById('sIncome').textContent = fmt(income);
  document.getElementById('sExpense').textContent = fmt(expense);
  const bEl = document.getElementById('sBalance');
  bEl.textContent = fmt(Math.abs(balance));
  bEl.className = 'sum-val '+(balance>=0?'c-pos':'c-neg');
  document.getElementById('sBudRem').textContent = fmt(Math.max(budRem,0));
  const pct = total>0?Math.min(expense/total*100,100):0;
  document.getElementById('budgetRemaining').textContent = fmt(Math.max(budRem,0));
  document.getElementById('totalBudgetDisp').textContent = fmt(total);
  document.getElementById('totalExpDisp').textContent = fmt(expense);
  document.getElementById('budgetPct').textContent = total>0?Math.round(expense/total*100)+'%':'—';
  const bar = document.getElementById('budgetBar');
  bar.style.width = pct+'%';
  bar.style.background = pct>=100?'var(--red)':pct>=80?'var(--accent2)':'var(--green)';
  renderCats(m); renderTx();
}

function renderCats(m){
  const el = document.getElementById('catList');
  el.innerHTML = '';
  CATS.forEach(cat=>{
    const exp = m.transactions.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+t.amount,0);
    const bud = m.budget.cats[cat]||0;
    const pct = bud>0?Math.min(exp/bud*100,100):0;
    const color = COLORS[cat]||'#999';
    const row = document.createElement('div');
    row.className='cat-row';
    row.innerHTML='<div class="cat-dot" style="background:'+color+'"></div>'
      +'<div class="cat-name">'+cat+'</div>'
      +'<div class="cat-nums">'+(bud>0?fmt(exp)+' / '+fmt(bud):fmt(exp))+'</div>'
      +(bud>0?'<div class="mini-bar"><div class="mini-fill" style="width:'+pct+'%;background:'+(pct>=100?'var(--red)':pct>=80?'var(--accent2)':color)+'"></div></div>':'');
    el.appendChild(row);
  });
}

function renderTx(){
  const m=md(cy,cm);
  const fc=document.getElementById('filterCat').value;
  const ft=document.getElementById('filterType').value;
  let txs=[...m.transactions];
  if(fc) txs=txs.filter(t=>t.category===fc);
  if(ft) txs=txs.filter(t=>t.type===ft);
  txs.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('txList');
  el.innerHTML='';
  if(!txs.length){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  txs.forEach(tx=>{
    const isInc=tx.type==='income';
    const color=COLORS[tx.category]||'#999';
    const div=document.createElement('div');
    div.className='tx-item';
    div.innerHTML='<div class="tx-date">'+tx.date.replace(/-/g,'/')+'</div>'
      +'<div><div class="tx-desc">'+esc(tx.desc)+'</div>'+(tx.memo?'<div class="tx-memo">'+esc(tx.memo)+'</div>':'')+'</div>'
      +'<span class="tx-badge" style="background:'+color+'22;color:'+color+'">'+tx.category+'</span>'
      +'<div class="tx-amount '+(isInc?'c-inc':'c-exp')+'">'+(isInc?'+':'−')+fmt(tx.amount)+'</div>'
      +'<button class="tx-del" onclick="delTx(\''+tx.id+'\')">✕</button>';
    el.appendChild(div);
  });
}

async function addTransaction(){
  const type=document.querySelector('input[name="txType"]:checked').value;
  const date=document.getElementById('txDate').value;
  const amount=parseInt(document.getElementById('txAmount').value)||0;
  const desc=document.getElementById('txDesc').value.trim();
  const cat=document.getElementById('txCat').value;
  const memo=document.getElementById('txMemo').value.trim();
  if(!date||amount<=0||!desc){alert('日付・金額・内容を入力してください。');return;}
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='保存中…';
  md(cy,cm).transactions.push({id:Date.now().toString(),type,date,amount,desc,category:cat,memo});
  render();
  await saveCloud();
  btn.disabled=false; btn.textContent='記録する';
  document.getElementById('txAmount').value='';
  document.getElementById('txDesc').value='';
  document.getElementById('txMemo').value='';
}

async function delTx(id){
  md(cy,cm).transactions=md(cy,cm).transactions.filter(t=>t.id!==id);
  render(); await saveCloud();
}

function openBudgetModal(){
  const m=md(cy,cm);
  document.getElementById('modalTotal').value=m.budget.total||'';
  const el=document.getElementById('catInputs');
  el.innerHTML='';
  CATS.forEach(cat=>{
    const row=document.createElement('div');
    row.className='cat-input-row';
    row.innerHTML='<label><span style="width:7px;height:7px;border-radius:50%;background:'+COLORS[cat]+';display:inline-block;flex-shrink:0"></span>'+cat+'</label>'
      +'<input type="number" data-cat="'+cat+'" placeholder="0" value="'+(m.budget.cats[cat]||'')+'">';
    el.appendChild(row);
  });
  document.getElementById('budgetOverlay').classList.add('open');
}

function closeBudgetModal(){ document.getElementById('budgetOverlay').classList.remove('open'); }

async function saveBudget(){
  const m=md(cy,cm);
  m.budget.total=parseInt(document.getElementById('modalTotal').value)||0;
  m.budget.cats={};
  document.querySelectorAll('#catInputs input[data-cat]').forEach(inp=>{
    const v=parseInt(inp.value)||0;
    if(v>0) m.budget.cats[inp.dataset.cat]=v;
  });
  closeBudgetModal(); render(); await saveCloud();
}

function switchView(v){
  document.getElementById('listView').style.display=v==='list'?'block':'none';
  document.getElementById('chartView').style.display=v==='chart'?'block':'none';
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('btnChart').classList.toggle('active',v==='chart');
  if(v==='chart') drawChart();
}

function drawChart(){
  const m=md(cy,cm);
  const canvas=document.getElementById('chartCanvas');
  const W=canvas.parentElement.clientWidth-32;
  canvas.width=W; canvas.height=280;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,280);
  const items=CATS.map(cat=>({cat,val:m.transactions.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+t.amount,0),bud:m.budget.cats[cat]||0,color:COLORS[cat]||'#999'})).filter(d=>d.val>0||d.bud>0);
  if(!items.length){ctx.fillStyle='#9c8e7a';ctx.font='13px sans-serif';ctx.textAlign='center';ctx.fillText('データがありません',W/2,140);return;}
  const maxVal=Math.max(...items.map(d=>Math.max(d.val,d.bud)),1);
  const CH=200,TOP=20,LEFT=52;
  const bw=Math.min(32,(W-LEFT-20)/items.length/2-2);
  const gap=(W-LEFT-20)/items.length;
  for(let i=0;i<=4;i++){
    const y=TOP+CH*(1-i/4);
    ctx.strokeStyle='#d4c9b5';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(LEFT,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle='#9c8e7a';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText((maxVal*i/4/10000).toFixed(1)+'万',LEFT-4,y+3);
  }
  items.forEach((d,i)=>{
    const cx=LEFT+gap*i+gap/2;
    if(d.bud>0){const bh=d.bud/maxVal*CH;ctx.fillStyle=d.color+'18';ctx.strokeStyle=d.color+'66';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.rect(cx-bw-1,TOP+CH-bh,bw*2+2,bh);ctx.stroke();ctx.setLineDash([]);}
    const bh=d.val/maxVal*CH;ctx.fillStyle=d.color+'cc';ctx.fillRect(cx-bw/2,TOP+CH-bh,bw,bh);
    ctx.fillStyle=d.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
    if(bh>14) ctx.fillText(fmtS(d.val),cx,TOP+CH-bh-4);
    ctx.fillStyle='#5c4f3d';ctx.font='10px sans-serif';ctx.fillText(d.cat,cx,TOP+CH+16);
  });
}

function fmt(n){ return '¥'+Math.abs(n).toLocaleString('ja-JP'); }
function fmtS(n){ return n>=10000?(n/10000).toFixed(1)+'万':'¥'+n.toLocaleString(); }
function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('budgetOverlay').addEventListener('click',function(e){ if(e.target===this) closeBudgetModal(); });

init();
</script>
</body>
