<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月のしるし — 家計簿</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif+JP:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
/* ── リセット・変数 ── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --red:#b03828;--red2:#c0392b;--red3:#8a2c1e;
  --gold:#c8905a;--gold2:#e0c060;--gold3:#f8e898;
  --paper:#fdf8f0;--paper2:#f5ead0;--paper3:#ede3c0;
  --ink:#281808;--ink2:#5a3820;--ink3:#9a7040;
  --green:#286840;--blue:#284880;--crimson:#b03828;
  --border:#c8905a;--shadow:rgba(80,30,10,0.12);
  --bg:#fdf8f0;
}
body{background:var(--paper2);color:var(--ink);font-family:'Noto Serif JP',serif;min-height:100vh;position:relative;overflow-x:hidden;}

/* ── 背景・麻の葉 ── */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg width='28' height='28' viewBox='0 0 28 28' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' stroke='%23b03828' stroke-width='0.28' stroke-opacity='0.055'%3E%3Cpath d='M14 0 L28 14 L14 28 L0 14 Z'/%3E%3Cpath d='M14 5 L23 14 L14 23 L5 14 Z'/%3E%3C/g%3E%3C/svg%3E");
}

/* ── 霊力の光の粒 ── */
.orbs{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(240,200,80,0.8) 0%,rgba(240,160,60,0.3) 50%,transparent 70%);animation:orbFloat linear infinite;}
@keyframes orbFloat{
  0%{opacity:0;transform:translateY(0) translateX(0) scale(0.5);}
  15%{opacity:1;}85%{opacity:0.6;}
  100%{opacity:0;transform:translateY(-600px) translateX(var(--dx)) scale(1.2);}
}

/* ── きらめき ── */
.sparkles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.sparkle{position:absolute;animation:sparkleAnim ease-in-out infinite;}
@keyframes sparkleAnim{0%,100%{opacity:0;transform:scale(0.3) rotate(0deg);}50%{opacity:1;transform:scale(1) rotate(180deg);}}

/* ── ヘッダー ── */
header{
  background:linear-gradient(180deg,var(--red3) 0%,var(--red2) 55%,var(--red3) 100%);
  border-bottom:3px solid #781808;
  padding:14px 24px;
  display:flex;align-items:center;gap:14px;
  position:sticky;top:0;z-index:100;overflow:hidden;
}
header::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--gold3),var(--gold2),transparent);
  background-size:200% 100%;
  animation:goldFlow 4s linear infinite;opacity:0.65;
}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;}
@keyframes goldFlow{0%{background-position:-200% center;}100%{background-position:200% center;}}
.hd-grid{position:absolute;inset:0;pointer-events:none;background-image:repeating-linear-gradient(90deg,transparent 0,transparent 22px,rgba(255,255,255,0.03) 22px,rgba(255,255,255,0.03) 23px),repeating-linear-gradient(0deg,transparent 0,transparent 22px,rgba(255,255,255,0.03) 22px,rgba(255,255,255,0.03) 23px);}

/* 鳥居（背景） */
.torii-bg{position:absolute;right:18px;top:8px;opacity:0.055;pointer-events:none;animation:toriiGlow 5s ease-in-out infinite;}
@keyframes toriiGlow{0%,100%{opacity:0.055;}50%{opacity:0.09;}}

.emblem{
  width:42px;height:42px;border:1.5px solid rgba(240,220,140,0.55);border-radius:50%;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  position:relative;z-index:1;
  background:radial-gradient(circle,rgba(240,180,60,0.15) 0%,transparent 70%);
  animation:emblemPulse 3s ease-in-out infinite;
}
@keyframes emblemPulse{0%,100%{box-shadow:0 0 0 rgba(240,200,80,0);}50%{box-shadow:0 0 10px rgba(240,200,80,0.22);}}
.emblem::before{content:'';position:absolute;inset:4px;border:1px solid rgba(240,220,140,0.2);border-radius:50%;}
.emblem-inner{font-size:1.2rem;}

.logo-area{position:relative;z-index:1;}
.logo-title{font-family:'Shippori Mincho',serif;font-size:1.4rem;font-weight:700;color:var(--paper);letter-spacing:0.22em;line-height:1;text-shadow:1px 2px 6px rgba(0,0,0,0.38);}
.logo-sub{font-size:0.58rem;color:rgba(253,248,240,0.6);letter-spacing:0.3em;margin-top:4px;font-weight:300;}

.header-nav{margin-left:auto;display:flex;gap:6px;z-index:1;}
.nav-btn{background:rgba(253,248,240,0.14);border:1px solid rgba(253,248,240,0.3);color:rgba(253,248,240,0.82);padding:5px 14px;font-family:'Shippori Mincho',serif;font-size:0.65rem;letter-spacing:0.15em;border-radius:1px;cursor:pointer;transition:all 0.2s;}
.nav-btn:hover,.nav-btn.active{background:var(--paper);color:var(--red2);border-color:var(--paper);font-weight:600;}

#syncStatus{font-size:0.6rem;letter-spacing:0.1em;margin-left:8px;padding:3px 10px;border-radius:20px;border:1px solid transparent;transition:all 0.3s;position:relative;z-index:1;}

/* ── 月バー ── */
.month-bar{background:var(--paper2);border-bottom:1px solid var(--border);padding:7px 24px;display:flex;align-items:center;gap:14px;position:relative;z-index:2;}
.month-bar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);opacity:0.35;}
.month-nav{background:none;border:none;color:var(--red2);font-size:0.9rem;cursor:pointer;padding:0 4px;}
.month-block{text-align:center;line-height:1.3;}
.month-main{font-family:'Shippori Mincho',serif;font-size:0.92rem;color:var(--ink);letter-spacing:0.22em;font-weight:600;display:block;}
.month-sub{font-size:0.56rem;color:var(--ink3);letter-spacing:0.15em;display:block;margin-top:2px;font-weight:300;}

/* ── 注連縄 ── */
.shimenawa-wrap{position:relative;width:100%;height:52px;z-index:3;pointer-events:none;overflow:visible;flex-shrink:0;}
.shimenawa{width:100%;height:52px;display:block;animation:shimenawaSway 6s ease-in-out infinite;}
@keyframes shimenawaSway{0%,100%{transform:translateY(0);}50%{transform:translateY(2px);}}
@keyframes goheiSway{0%,100%{transform:rotate(-5deg);}50%{transform:rotate(5deg);}}

/* ── メインレイアウト ── */
main{max-width:1100px;margin:0 auto;padding:24px 16px;display:grid;grid-template-columns:320px 1fr;gap:20px;align-items:start;position:relative;z-index:1;}
@media(max-width:700px){main{grid-template-columns:1fr;}header{padding:12px 16px;}.month-bar{padding:7px 16px;}.summary-row{grid-template-columns:repeat(2,1fr)!important;}}

/* ── カード ── */
.card{background:rgba(253,248,240,0.88);border:1px solid var(--border);border-radius:2px;box-shadow:0 2px 8px var(--shadow);overflow:hidden;margin-bottom:16px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.5;}
.card:last-child{margin-bottom:0;}
.card-header{background:var(--paper2);padding:9px 16px;border-bottom:1px solid var(--border);font-size:0.65rem;letter-spacing:0.22em;color:var(--red2);font-weight:600;display:flex;align-items:center;gap:6px;}
.card-body{padding:14px;}

/* ── 予算 ── */
.budget-center{text-align:center;padding:6px 0 10px;}
.budget-remaining{font-family:'DM Mono',monospace;font-size:1.8rem;color:var(--ink);display:block;font-weight:600;}
.budget-sublabel{font-size:0.58rem;color:var(--ink3);letter-spacing:0.2em;display:block;margin-top:2px;}
.bar-wrap{height:6px;background:var(--paper3);border:1px solid var(--border);margin:7px 0 4px;overflow:hidden;border-radius:1px;}
.bar-fill{height:100%;border-radius:1px;transition:width 0.6s cubic-bezier(.4,0,.2,1),background 0.4s;position:relative;overflow:hidden;}
.bar-fill::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,0.3) 50%,transparent 100%);animation:shimmer 2.5s ease-in-out infinite;transform:translateX(-100%);}
@keyframes shimmer{0%{transform:translateX(-100%);}100%{transform:translateX(300%);}}
.bar-meta{display:flex;justify-content:space-between;font-size:0.57rem;color:var(--ink3);margin-bottom:8px;}
.budget-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px;}
.stat-box{border:1px solid var(--border);padding:6px 7px;text-align:center;background:rgba(200,110,50,0.05);border-radius:1px;}
.stat-val{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--ink);display:block;}
.stat-val.exp{color:var(--red2);}
.stat-lbl{font-size:0.54rem;color:var(--ink3);}
.budget-edit-btn{width:100%;background:rgba(176,56,40,0.06);border:1px solid var(--border);color:var(--ink2);padding:6px;font-family:'Shippori Mincho',serif;font-size:0.6rem;letter-spacing:0.18em;border-radius:1px;cursor:pointer;transition:all 0.2s;}
.budget-edit-btn:hover{background:rgba(176,56,40,0.12);color:var(--red2);border-color:var(--red2);}

/* ── カテゴリ別 ── */
.cat-row{display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid rgba(200,140,80,0.18);}
.cat-row:last-child{border:none;}
.cat-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:0.7rem;flex:1;color:var(--ink);}
.cat-mini{width:40px;height:4px;background:var(--paper3);border-radius:1px;overflow:hidden;flex-shrink:0;}
.cat-mini-fill{height:100%;border-radius:1px;}
.cat-nums{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--ink3);text-align:right;white-space:nowrap;}

/* ── フォーム ── */
.form-group{margin-bottom:10px;}
.form-label{font-size:0.68rem;color:var(--ink2);letter-spacing:0.12em;display:block;margin-bottom:4px;}
.form-input,.form-select{width:100%;background:rgba(253,248,240,0.8);border:1px solid var(--border);border-radius:1px;padding:7px 9px;font-family:'Noto Serif JP',serif;font-size:0.82rem;color:var(--ink);outline:none;transition:border-color 0.2s;-webkit-appearance:none;}
.form-input:focus,.form-select:focus{border-color:var(--red2);}
.type-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.type-label{display:flex;align-items:center;gap:6px;font-size:0.78rem;color:var(--ink2);cursor:pointer;}
.submit-btn{width:100%;background:var(--red2);color:#fff;border:none;padding:10px;font-family:'Shippori Mincho',serif;font-size:0.88rem;letter-spacing:0.18em;cursor:pointer;border-radius:1px;transition:background 0.2s;margin-top:4px;}
.submit-btn:hover{background:var(--red3);}
.submit-btn:disabled{background:var(--ink3);cursor:not-allowed;}

/* ── 内訳 ── */
.breakdown-section{margin-top:10px;border-top:1px solid var(--border);padding-top:10px;}
.breakdown-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.breakdown-label{font-size:0.68rem;color:var(--ink2);letter-spacing:0.12em;}
.breakdown-total{font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--red2);}
.add-item-btn{background:none;border:1px dashed var(--border);color:var(--ink3);padding:3px 10px;font-size:0.68rem;border-radius:1px;cursor:pointer;font-family:'Noto Serif JP',serif;transition:all 0.2s;}
.add-item-btn:hover{border-color:var(--red2);color:var(--red2);}
.breakdown-item{background:rgba(200,110,50,0.04);border:1px solid var(--border);border-radius:2px;padding:8px 10px;margin-bottom:6px;position:relative;}
.breakdown-item-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;margin-bottom:5px;}
.breakdown-item-name{background:transparent;border:none;border-bottom:1px solid var(--border);padding:3px 0;font-family:'Noto Serif JP',serif;font-size:0.8rem;color:var(--ink);width:100%;outline:none;}
.breakdown-item-name:focus{border-bottom-color:var(--red2);}
.breakdown-item-price{background:var(--paper);border:1px solid var(--border);border-radius:1px;padding:3px 6px;font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--ink);width:88px;text-align:right;outline:none;}
.breakdown-item-price:focus{border-color:var(--red2);}
.breakdown-item-checks{display:flex;align-items:center;gap:12px;font-size:0.65rem;color:var(--ink2);}
.breakdown-item-checks label{display:flex;align-items:center;gap:4px;cursor:pointer;}
.breakdown-item-tax{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--ink3);margin-left:auto;}
.del-item-btn{position:absolute;top:6px;right:6px;background:none;border:none;color:var(--border);cursor:pointer;font-size:0.75rem;transition:color 0.2s;padding:1px 3px;}
.del-item-btn:hover{color:var(--red2);}

/* ── AIコメント ── */
.ai-comment-wrap{margin-top:12px;padding:10px 13px;background:rgba(200,110,50,0.06);border:1px solid var(--border);border-radius:2px;border-left:3px solid var(--gold);display:none;animation:fadeIn 0.4s ease;}
.ai-comment-wrap.show{display:block;}
.ai-comment-label{font-size:0.58rem;color:var(--gold);letter-spacing:0.18em;display:block;margin-bottom:5px;font-family:'Shippori Mincho',serif;}
.ai-comment-text{font-size:0.78rem;color:var(--ink2);line-height:1.8;}
.ai-comment-loading{font-size:0.72rem;color:var(--ink3);font-style:italic;letter-spacing:0.1em;}

/* ── サマリ ── */
.summary-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
.sum-card{background:rgba(253,248,240,0.88);border:1px solid var(--border);border-radius:2px;padding:10px 12px;box-shadow:0 1px 4px var(--shadow);position:relative;overflow:hidden;transition:box-shadow 0.2s;}
.sum-card:hover{box-shadow:0 3px 10px var(--shadow);}
.sum-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--red2);opacity:0.3;}
.sum-label{font-size:0.57rem;color:var(--ink3);letter-spacing:0.14em;display:block;margin-bottom:4px;}
.sum-val{font-family:'DM Mono',monospace;font-size:0.95rem;display:block;}
.c-inc{color:var(--green);}.c-exp{color:var(--red2);}.c-pos{color:var(--blue);}.c-neg{color:var(--red2);}.c-bud{color:var(--gold);}

/* ── 明細 ── */
.list-header{display:flex;align-items:center;gap:10px;margin-bottom:9px;flex-wrap:wrap;}
.list-title{font-family:'Shippori Mincho',serif;font-size:0.72rem;letter-spacing:0.25em;color:var(--red2);font-weight:600;display:flex;align-items:center;gap:8px;}
.list-title::before{content:'';width:6px;height:6px;background:var(--red2);border-radius:50%;flex-shrink:0;animation:markPulse 2s ease-in-out infinite;}
@keyframes markPulse{0%,100%{box-shadow:0 0 0 2px rgba(176,56,40,0.2);}50%{box-shadow:0 0 0 5px rgba(176,56,40,0.06);}}
.list-title::after{content:'';flex:1;height:1px;background:repeating-linear-gradient(90deg,var(--border) 0,var(--border) 3px,transparent 3px,transparent 8px);}
.filter-sel{font-size:0.68rem;background:var(--paper);border:1px solid var(--border);border-radius:1px;padding:4px 8px;font-family:'Noto Serif JP',serif;color:var(--ink2);cursor:pointer;-webkit-appearance:none;}
.tx-item{background:rgba(253,248,240,0.82);border:1px solid rgba(200,144,90,0.22);border-radius:2px;margin-bottom:5px;display:block;padding:9px 13px;box-shadow:0 1px 3px var(--shadow);transition:box-shadow 0.15s,border-color 0.15s,transform 0.15s;animation:fadeIn 0.25s ease;border-left:3px solid transparent;}
.tx-item:hover{box-shadow:0 3px 10px var(--shadow);border-color:var(--border);transform:translateX(2px);}
.tx-item.exp{border-left-color:var(--red2);}
.tx-item.inc{border-left-color:var(--green);}
.tx-main-row{display:grid;grid-template-columns:auto 1fr auto auto auto;align-items:center;gap:10px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);}}
.tx-date{font-family:'DM Mono',monospace;font-size:0.6rem;color:var(--ink3);white-space:nowrap;}
.tx-desc{font-size:0.8rem;color:var(--ink);}
.tx-memo{font-size:0.62rem;color:var(--ink3);margin-top:1px;}
.tx-badge{font-size:0.58rem;padding:2px 8px;border:1px solid var(--border);color:var(--ink2);white-space:nowrap;letter-spacing:0.06em;background:rgba(200,110,50,0.08);border-radius:1px;}
.tx-amount{font-family:'DM Mono',monospace;font-size:0.88rem;text-align:right;white-space:nowrap;}
.tx-del{background:none;border:none;color:var(--border);cursor:pointer;font-size:0.8rem;padding:2px 4px;transition:color 0.2s;}
.tx-del:hover{color:var(--red2);}
.tx-breakdown-toggle{background:none;border:none;color:var(--ink3);font-size:0.65rem;cursor:pointer;padding:2px 6px;transition:all 0.2s;margin-top:4px;}
.tx-breakdown-toggle:hover{color:var(--red2);}
.tx-breakdown-detail{margin-top:7px;padding-top:7px;border-top:1px solid rgba(200,140,80,0.2);display:none;}
.tx-breakdown-detail.open{display:block;}
.tx-bd-row{display:flex;justify-content:space-between;align-items:center;font-size:0.68rem;padding:2px 0;color:var(--ink2);}
.tx-bd-name{flex:1;}
.tx-bd-type{font-size:0.6rem;padding:1px 5px;border-radius:10px;margin:0 6px;}
.tx-bd-price{font-family:'DM Mono',monospace;color:var(--ink);}
.empty{text-align:center;padding:36px;color:var(--ink3);font-size:0.82rem;letter-spacing:0.1em;}

/* ── グラフ ── */
#chartCanvas{display:block;max-width:100%;}

/* ── モーダル ── */
.overlay{position:fixed;inset:0;background:rgba(40,24,8,0.55);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 16px;}
.overlay.open{display:flex;}
.modal{background:var(--paper);border:1px solid var(--border);border-radius:2px;padding:22px;width:100%;max-width:400px;box-shadow:0 8px 32px rgba(40,24,8,0.22);margin:auto;}
.modal-title{font-family:'Shippori Mincho',serif;font-size:1rem;letter-spacing:0.18em;color:var(--ink);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:10px;border-top:1px solid var(--border);}
.modal-btn{padding:7px 18px;border-radius:1px;font-family:'Noto Serif JP',serif;font-size:0.78rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;}
.modal-btn.cancel{background:none;border:1px solid var(--border);color:var(--ink2);}
.modal-btn.cancel:hover{border-color:var(--ink3);}
.modal-btn.save{background:var(--red2);border:1px solid var(--red2);color:#fff;}
.modal-btn.save:hover{background:var(--red3);}
.overall-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.overall-row label{flex:1;font-size:0.8rem;color:var(--ink);font-weight:600;}
.overall-row input{width:130px;background:rgba(200,110,50,0.06);border:1px solid var(--red2);border-radius:1px;padding:6px 9px;font-family:'DM Mono',monospace;font-size:0.95rem;color:var(--red2);text-align:right;outline:none;}
.cat-input-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.cat-input-row label{flex:1;font-size:0.76rem;color:var(--ink2);display:flex;align-items:center;gap:6px;}
.cat-input-row input{width:108px;background:rgba(200,110,50,0.04);border:1px solid var(--border);border-radius:1px;padding:5px 8px;font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--ink);text-align:right;outline:none;}
.cat-input-row input:focus{border-color:var(--red2);}
.modal-sec-label{font-size:0.65rem;color:var(--ink3);letter-spacing:0.12em;margin-bottom:8px;}

/* ── フッター ── */
footer{
  border-top:2px solid var(--red2);
  padding:8px 24px;
  background:linear-gradient(180deg,var(--red3) 0%,var(--red2) 100%);
  display:flex;justify-content:space-between;align-items:center;
  position:relative;z-index:1;
  margin-top:24px;
}
footer::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold2),var(--gold3),var(--gold2),transparent);background-size:200% 100%;animation:goldFlow 4s linear infinite;opacity:0.4;}
.ft-text{font-size:0.58rem;color:rgba(253,248,240,0.6);letter-spacing:0.18em;}
.ft-center{font-size:0.7rem;color:rgba(253,248,240,0.35);letter-spacing:6px;}
</style>
</head>
<body>

<script>
// ── 定数 ──
const GAS_URL = 'https://script.google.com/macros/s/AKfycbyMb6RtIm5aCk5fyZ-prP62-vHxircGCY0KTmZ2LHGtooFDtE23S3FHl96-QZmsGrvL/exec';
const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY';
const KYUREKI = ['睦月','如月','弥生','卯月','皐月','水無月','文月','葉月','長月','神無月','霜月','師走'];
const CATS = ['食費','日用品','交通費','外食','娯楽','医療','衣類','光熱費','通信費','その他'];
const COLORS = {
  '食費':'#b03828','日用品':'#c8905a','交通費':'#284880','外食':'#a03030',
  '娯楽':'#286840','医療':'#604888','衣類':'#c87040','光熱費':'#407840',
  '通信費':'#304878','その他':'#907060','給与':'#286840','副収入':'#284880'
};

// ── 状態 ──
let cy, cm;
let db = {};
let syncing = false;

function key(y,m){ return y+'-'+String(m).padStart(2,'0'); }
function md(y,m){ const k=key(y,m); if(!db[k]) db[k]={transactions:[],budget:{total:0,cats:{}}}; return db[k]; }

// ── 同期ステータス ──
function setSS(state){
  const el = document.getElementById('syncStatus');
  const MAP={idle:'',loading:'読み込み中…',saving:'保存中…',ok:'同期済み ✓',error:'同期失敗 ✕'};
  const COL={idle:'transparent',loading:'rgba(253,248,240,0.15)',saving:'rgba(253,248,240,0.15)',ok:'rgba(40,104,64,0.3)',error:'rgba(176,56,40,0.3)'};
  const TC={idle:'transparent',loading:'rgba(253,248,240,0.7)',saving:'rgba(253,248,240,0.7)',ok:'rgba(253,248,240,0.9)',error:'rgba(253,248,240,0.9)'};
  const BC={idle:'transparent',loading:'rgba(253,248,240,0.2)',saving:'rgba(253,248,240,0.2)',ok:'rgba(40,104,64,0.4)',error:'rgba(176,56,40,0.4)'};
  el.textContent=MAP[state]||'';
  el.style.background=COL[state];
  el.style.color=TC[state];
  el.style.borderColor=BC[state];
}

// ── クラウド ──
async function loadCloud(){
  setSS('loading');
  try {
    const res = await fetch(GAS_URL+'?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = JSON.parse(await res.text());
    if(json && typeof json==='object' && !Array.isArray(json)){
      db=json; localStorage.setItem('kakeibo',JSON.stringify(db));
    }
    setSS('ok');
  } catch(e){ console.error('loadCloud:',e); setSS('error'); }
}

async function saveCloud(){
  if(syncing) return;
  syncing=true; setSS('saving');
  localStorage.setItem('kakeibo',JSON.stringify(db));
  try {
    const res = await fetch(GAS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(db)));
    if(!res.ok) throw new Error('HTTP '+res.status);
    const json = JSON.parse(await res.text());
    if(json&&json.status==='ok') setSS('ok'); else throw new Error();
  } catch(e){ console.error('saveCloud:',e); setSS('error'); }
  syncing=false;
}

// ── Gemini AIコメント ──
async function getAIComment(tx, monthData){
  const wrap = document.getElementById('aiCommentWrap');
  const textEl = document.getElementById('aiCommentText');
  wrap.classList.remove('show');
  if(!GEMINI_API_KEY || GEMINI_API_KEY==='YOUR_GEMINI_API_KEY') return;
  wrap.classList.add('show');
  textEl.innerHTML = '<span class="ai-comment-loading">考え中…</span>';

  const income  = monthData.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = monthData.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const budget  = monthData.budget.total||0;
  const budRem  = budget-expense;

  const prompt = `あなたは「レイ」という名前の家計管理アシスタントです。以下の設定に従って、記録に対してひとこと短いコメントをしてください。

【キャラクター設定】
- 名前：レイ
- 口調：素っ気なくてぶっきらぼうだが、根はとても優しくて相手のことを気にかけている。「〜でしょ」「…まあ」「〜ね」みたいな話し方。否定的な言葉はなるべく使わない。
- 性格：お金には敏感だが、責めるより「こうしたらもっといいかも」と提案する方が好き。節約できたときや収入が入ったときは素直に、少し照れながら喜ぶ。
- 守銭奴属性：お金が増えると嬉しそうにする。減るときは少し渋い顔をするが、必要な出費は認める。
- 優しさの出し方：ストレートに褒めるのは恥ずかしいのか、「…まあ、ちゃんとやってるじゃない」「悪くないわよ」みたいな照れ隠しをしながら実は応援している。
- 絶対に「私はAIです」とは言わない。レイとして振る舞う。
- 1〜2文で答える。説教はしない。

【記録内容】
- 種別: ${tx.type==='expense'?'支出':'収入'}
- 内容: ${tx.desc}
- カテゴリ: ${tx.category}
- 金額: ${fmt(tx.amount)}
${tx.memo?'- メモ: '+tx.memo:''}

【今月の状況】
- 収入合計: ${fmt(income)}
- 支出合計: ${fmt(expense)}
${budget>0?'- 設定予算: '+fmt(budget)+'\n- 残り予算: '+fmt(budRem):'- 予算未設定'}

上記を踏まえて、レイとしてひとこと。短く、温かく。`;

  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent`,
      { method:'POST', headers:{'Content-Type':'application/json','x-goog-api-key':GEMINI_API_KEY},
        body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{maxOutputTokens:150,temperature:0.8} }) }
    );
    const data = await res.json();
    console.log('Gemini response:', JSON.stringify(data));
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(text) textEl.textContent=text.trim(); else { console.warn('No text found in response'); wrap.classList.remove('show'); }
  } catch(e){ console.error('Gemini:',e); wrap.classList.remove('show'); }
}

// ── 初期化 ──
async function init(){
  const now = new Date();
  cy=now.getFullYear(); cm=now.getMonth()+1;
  document.getElementById('txDate').value=now.toISOString().split('T')[0];
  const local=localStorage.getItem('kakeibo');
  if(local) try{db=JSON.parse(local);}catch(e){}
  render();
  await loadCloud();
  render();
}

// ── 月切替 ──
function changeMonth(d){
  cm+=d; if(cm>12){cm=1;cy++;} if(cm<1){cm=12;cy--;}
  render();
}

// ── 全体描画 ──
function render(){
  const m=md(cy,cm);
  document.getElementById('monthMain').textContent=KYUREKI[cm-1];
  document.getElementById('monthSub').textContent=cy+'年 '+cm+'月';

  const income  = m.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const expense = m.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const balance = income-expense;
  const total   = m.budget.total||0;
  const budRem  = total-expense;

  document.getElementById('sIncome').textContent=fmt(income);
  document.getElementById('sExpense').textContent=fmt(expense);
  const bEl=document.getElementById('sBalance');
  bEl.textContent=(balance<0?'−':'')+fmt(Math.abs(balance));
  bEl.className='sum-val '+(balance>=0?'c-pos':'c-neg');
  document.getElementById('sBudRem').textContent=fmt(Math.max(budRem,0));

  const pct=total>0?Math.min(expense/total*100,100):0;
  document.getElementById('budgetRemaining').textContent=fmt(Math.max(budRem,0));
  document.getElementById('totalBudgetDisp').textContent=fmt(total);
  document.getElementById('totalExpDisp').textContent=fmt(expense);
  document.getElementById('budgetPct').textContent=total>0?Math.round(expense/total*100)+'%':'—';
  const bar=document.getElementById('budgetBar');
  bar.style.width=pct+'%';
  bar.style.background=pct>=100?'var(--red2)':pct>=80?'#c8905a':'var(--green)';

  renderCats(m); renderTx();
}

function renderCats(m){
  const el=document.getElementById('catList'); el.innerHTML='';
  CATS.forEach(cat=>{
    const exp=m.transactions.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+t.amount,0);
    const bud=m.budget.cats[cat]||0;
    const pct=bud>0?Math.min(exp/bud*100,100):0;
    const color=COLORS[cat]||'#907060';
    const row=document.createElement('div'); row.className='cat-row';
    row.innerHTML='<div class="cat-dot" style="background:'+color+'"></div>'
      +'<div class="cat-name">'+cat+'</div>'
      +(bud>0?'<div class="cat-mini"><div class="cat-mini-fill" style="width:'+pct+'%;background:'+(pct>=100?'var(--red2)':pct>=80?'#c8905a':color)+'"></div></div>':'')
      +'<div class="cat-nums">'+(bud>0?fmt(exp)+' / '+fmt(bud):fmt(exp))+'</div>';
    el.appendChild(row);
  });
}

function renderTx(){
  const m=md(cy,cm);
  const fc=document.getElementById('filterCat').value;
  const ft=document.getElementById('filterType').value;
  let txs=[...m.transactions];
  if(fc) txs=txs.filter(t=>t.category===fc);
  if(ft) txs=txs.filter(t=>t.type===ft);
  txs.sort((a,b)=>b.date.localeCompare(a.date));
  const el=document.getElementById('txList'); el.innerHTML='';
  if(!txs.length){el.innerHTML='<div class="empty">記録がありません</div>';return;}
  txs.forEach(tx=>{
    const isInc=tx.type==='income';
    const color=COLORS[tx.category]||'#907060';
    const hasBreakdown=tx.breakdown&&tx.breakdown.length>0;
    const div=document.createElement('div');
    div.className='tx-item '+(isInc?'inc':'exp');
    const mainRow=document.createElement('div');
    mainRow.className='tx-main-row';
    mainRow.innerHTML='<div class="tx-date">'+tx.date.replace(/-/g,'/')+'</div>'
      +'<div><div class="tx-desc">'+esc(tx.desc)+'</div>'+(tx.memo?'<div class="tx-memo">'+esc(tx.memo)+'</div>':'')+'</div>'
      +'<span class="tx-badge" style="color:'+color+'">'+tx.category+'</span>'
      +'<div class="tx-amount '+(isInc?'c-inc':'c-exp')+'">'+(isInc?'+':'−')+fmt(tx.amount)+'</div>'
      +'<button class="tx-del" onclick="delTx(\''+tx.id+'\')">✕</button>';
    div.appendChild(mainRow);
    if(hasBreakdown){
      const toggleId='bd-'+tx.id;
      const toggle=document.createElement('button');
      toggle.className='tx-breakdown-toggle';
      toggle.textContent='内訳 ('+tx.breakdown.length+'品目) ▾';
      toggle.onclick=function(){
        const detail=document.getElementById(toggleId);
        detail.classList.toggle('open');
        toggle.textContent=detail.classList.contains('open')?'内訳を閉じる ▴':'内訳 ('+tx.breakdown.length+'品目) ▾';
      };
      div.appendChild(toggle);
      const detail=document.createElement('div');
      detail.className='tx-breakdown-detail'; detail.id=toggleId;
      tx.breakdown.forEach(item=>{
        const isFood=item.isFood;
        const taxRate=isFood?0.08:0.10;
        const priceEx=item.isTaxIncluded?Math.round(item.price/(1+taxRate)):item.price;
        const priceIn=item.isTaxIncluded?item.price:Math.round(item.price*(1+taxRate));
        const row=document.createElement('div'); row.className='tx-bd-row';
        row.innerHTML='<span class="tx-bd-name">'+esc(item.name)+'</span>'
          +'<span class="tx-bd-type" style="background:'+(isFood?'rgba(40,104,64,0.12)':'rgba(40,72,128,0.12)')+';color:'+(isFood?'var(--green)':'var(--blue)')+'">'+(isFood?'食品 8%':'一般 10%')+'</span>'
          +'<span class="tx-bd-price">'+fmt(priceEx)+' → '+fmt(priceIn)+'</span>';
        detail.appendChild(row);
      });
      div.appendChild(detail);
    }
    el.appendChild(div);
  });
}

// ── 追加 ──
async function addTransaction(){
  console.log('addTransaction called');
  const type=document.querySelector('input[name="txType"]:checked').value;
  const date=document.getElementById('txDate').value;
  const desc=document.getElementById('txDesc').value.trim();
  const cat=document.getElementById('txCat').value;
  const memo=document.getElementById('txMemo').value.trim();

  const breakdown=[];
  document.querySelectorAll('.breakdown-item').forEach(item=>{
    const name=item.querySelector('.breakdown-item-name').value.trim();
    const price=parseFloat(item.querySelector('.breakdown-item-price').value)||0;
    const isFood=item.querySelector('.chk-food').checked;
    const isTaxIncluded=item.querySelector('.chk-taxin').checked;
    if(name&&price>0) breakdown.push({name,price,isFood,isTaxIncluded});
  });

  let amount;
  if(breakdown.length>0){
    amount=breakdown.reduce((s,item)=>{
      const rate=item.isFood?0.08:0.10;
      return s+(item.isTaxIncluded?item.price:Math.round(item.price*(1+rate)));
    },0);
  } else {
    amount=parseInt(document.getElementById('txAmount').value)||0;
  }

  if(!date||amount<=0||!desc){alert('日付・金額・内容を入力してください。');return;}

  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='保存中…';

  const newTx={id:Date.now().toString(),type,date,amount,desc,category:cat,memo,breakdown};
  md(cy,cm).transactions.push(newTx);
  render();
  await saveCloud();

  console.log('Calling getAIComment, key:', GEMINI_API_KEY ? GEMINI_API_KEY.substring(0,8)+'...' : 'EMPTY');
  getAIComment(newTx, md(cy,cm));

  btn.disabled=false; btn.textContent='記録する';
  document.getElementById('txAmount').value='';
  document.getElementById('txDesc').value='';
  document.getElementById('txMemo').value='';
  document.getElementById('breakdownItems').innerHTML='';
  document.getElementById('breakdownTotal').textContent='';
}

// ── 削除 ──
async function delTx(id){
  md(cy,cm).transactions=md(cy,cm).transactions.filter(t=>t.id!==id);
  render(); await saveCloud();
}

// ── 予算モーダル ──
function openBudgetModal(){
  const m=md(cy,cm);
  document.getElementById('modalTotal').value=m.budget.total||'';
  const el=document.getElementById('catInputs'); el.innerHTML='';
  CATS.forEach(cat=>{
    const row=document.createElement('div'); row.className='cat-input-row';
    row.innerHTML='<label><span style="width:6px;height:6px;border-radius:50%;background:'+(COLORS[cat]||'#907060')+';display:inline-block;flex-shrink:0"></span>'+cat+'</label>'
      +'<input type="number" data-cat="'+cat+'" placeholder="0" value="'+(m.budget.cats[cat]||'')+'">';
    el.appendChild(row);
  });
  document.getElementById('budgetOverlay').classList.add('open');
}
function closeBudgetModal(){ document.getElementById('budgetOverlay').classList.remove('open'); }
async function saveBudget(){
  const m=md(cy,cm);
  m.budget.total=parseInt(document.getElementById('modalTotal').value)||0;
  m.budget.cats={};
  document.querySelectorAll('#catInputs input[data-cat]').forEach(inp=>{
    const v=parseInt(inp.value)||0;
    if(v>0) m.budget.cats[inp.dataset.cat]=v;
  });
  closeBudgetModal(); render(); await saveCloud();
}

// ── 内訳 ──
function addBreakdownItem(){
  const container=document.getElementById('breakdownItems');
  const idx=Date.now();
  const item=document.createElement('div'); item.className='breakdown-item';
  item.innerHTML='<button class="del-item-btn" onclick="this.parentNode.remove();updateBreakdownTotal()">✕</button>'
    +'<div class="breakdown-item-row">'
    +'<input type="text" class="breakdown-item-name" placeholder="品目名（例: 牛乳）" oninput="updateBreakdownTotal()">'
    +'<input type="number" class="breakdown-item-price" placeholder="0" min="0" oninput="updateBreakdownTotal()">'
    +'</div>'
    +'<div class="breakdown-item-checks">'
    +'<label><input type="checkbox" class="chk-food" checked onchange="updateBreakdownTotal()"> 食品（8%）</label>'
    +'<label><input type="checkbox" class="chk-taxin" onchange="updateBreakdownTotal()"> 税込で入力</label>'
    +'<span class="breakdown-item-tax" id="tax-'+idx+'"></span>'
    +'</div>';
  container.appendChild(item);
  item.querySelector('.breakdown-item-name').focus();
  updateBreakdownTotal();
}

function updateBreakdownTotal(){
  let total=0;
  document.querySelectorAll('.breakdown-item').forEach(item=>{
    const price=parseFloat(item.querySelector('.breakdown-item-price').value)||0;
    const isFood=item.querySelector('.chk-food').checked;
    const isTaxIn=item.querySelector('.chk-taxin').checked;
    const rate=isFood?0.08:0.10;
    const taxInc=isTaxIn?price:Math.round(price*(1+rate));
    const taxEx=isTaxIn?Math.round(price/(1+rate)):price;
    const taxEl=item.querySelector('[id^="tax-"]');
    if(price>0) taxEl.textContent=isTaxIn?'(税抜 '+fmt(taxEx)+')':'→ 税込 '+fmt(taxInc);
    else taxEl.textContent='';
    total+=isTaxIn?price:Math.round(price*(1+rate));
  });
  const el=document.getElementById('breakdownTotal');
  el.textContent=total>0?'合計（税込）'+fmt(total):'';
  if(total>0) document.getElementById('txAmount').value=total;
}

// ── ビュー切替 ──
function switchView(v){
  document.getElementById('listView').style.display=v==='list'?'block':'none';
  document.getElementById('chartView').style.display=v==='chart'?'block':'none';
  document.getElementById('btnList').classList.toggle('active',v==='list');
  document.getElementById('btnChart').classList.toggle('active',v==='chart');
  if(v==='chart') drawChart();
}

// ── グラフ ──
function drawChart(){
  const m=md(cy,cm);
  const canvas=document.getElementById('chartCanvas');
  const W=canvas.parentElement.clientWidth-28;
  canvas.width=W; canvas.height=280;
  const ctx=canvas.getContext('2d');
  ctx.clearRect(0,0,W,280);
  const items=CATS.map(cat=>({cat,val:m.transactions.filter(t=>t.type==='expense'&&t.category===cat).reduce((s,t)=>s+t.amount,0),bud:m.budget.cats[cat]||0,color:COLORS[cat]||'#907060'})).filter(d=>d.val>0||d.bud>0);
  if(!items.length){ctx.fillStyle='#9a7040';ctx.font='13px serif';ctx.textAlign='center';ctx.fillText('データがありません',W/2,140);return;}
  const maxVal=Math.max(...items.map(d=>Math.max(d.val,d.bud)),1);
  const CH=200,TOP=20,LEFT=52;
  const bw=Math.min(30,(W-LEFT-20)/items.length/2-2);
  const gap=(W-LEFT-20)/items.length;
  for(let i=0;i<=4;i++){
    const y=TOP+CH*(1-i/4);
    ctx.strokeStyle='rgba(200,144,90,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(LEFT,y);ctx.lineTo(W-10,y);ctx.stroke();
    ctx.fillStyle='#9a7040';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText((maxVal*i/4/10000).toFixed(1)+'万',LEFT-4,y+3);
  }
  items.forEach((d,i)=>{
    const cx=LEFT+gap*i+gap/2;
    if(d.bud>0){const bh=d.bud/maxVal*CH;ctx.fillStyle=d.color+'18';ctx.strokeStyle=d.color+'66';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.rect(cx-bw-1,TOP+CH-bh,bw*2+2,bh);ctx.stroke();ctx.setLineDash([]);}
    const bh=d.val/maxVal*CH;ctx.fillStyle=d.color+'cc';ctx.fillRect(cx-bw/2,TOP+CH-bh,bw,bh);
    ctx.fillStyle=d.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
    if(bh>14) ctx.fillText(fmtS(d.val),cx,TOP+CH-bh-4);
    ctx.fillStyle='#5a3820';ctx.font='10px serif';ctx.fillText(d.cat,cx,TOP+CH+16);
  });
}

// ── ヘルパー ──
function fmt(n){ return '¥'+Math.abs(n).toLocaleString('ja-JP'); }
function fmtS(n){ return n>=10000?(n/10000).toFixed(1)+'万':'¥'+n.toLocaleString(); }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

document.getElementById('budgetOverlay').addEventListener('click',function(e){ if(e.target===this) closeBudgetModal(); });

init();
</script>
